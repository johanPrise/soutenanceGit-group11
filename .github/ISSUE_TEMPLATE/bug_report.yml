name: Bug report
description: Signaler un bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Merci de decrire le bug avec precision.
  - type: input
    id: summary
    attributes:
      label: Resume
      placeholder: Description courte du bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Etapes de reproduction
      placeholder: |
        1. Aller sur ...
        2. Cliquer sur ...
        3. Observer ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportement observe
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environnement
      placeholder: OS, Node.js, navigateur
