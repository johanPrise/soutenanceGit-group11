name: Check JavaScript code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint (warning only)
        run: |
          if ! npm run lint; then
            echo "::warning::ESLint reported issues (non-blocking check)."
            echo "### ESLint reported issues (non-blocking check)" >> "$GITHUB_STEP_SUMMARY"
          fi